<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Equity Research Copilot | By Prem</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f7ff;color:#333;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:0 16px 40px}
.hdr{background:linear-gradient(135deg,#1E1850 0%,#3B2FA0 40%,#534AB7 100%);border-radius:0 0 16px 16px;padding:28px 24px 20px;text-align:center;position:relative;overflow:hidden}
.hdr .c1{position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04)}
.hdr .c2{position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.03)}
.hdr .tag{font-size:10px;font-weight:700;color:#AFA9EC;letter-spacing:2px;margin-bottom:6px}
.hdr h1{font-size:22px;font-weight:700;color:#fff;margin:0 0 4px}
.hdr p{font-size:12px;color:#CECBF6;margin:0}
.input-row{display:flex;gap:8px;margin:20px 0 8px}
.input-row input{flex:1;padding:12px 16px;font-size:15px;border:2px solid #e0e0e0;border-radius:10px;outline:none;font-weight:500;background:#fff;transition:border-color .2s}
.input-row input:focus{border-color:#534AB7}
.input-row button{padding:12px 24px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#534AB7,#3B2FA0);border:none;border-radius:10px;cursor:pointer;white-space:nowrap;transition:opacity .2s}
.input-row button:disabled{background:#c8c6db;cursor:not-allowed}
.input-row button:hover:not(:disabled){opacity:.9}
.picks{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px}
.picks button{padding:4px 11px;font-size:11px;font-weight:500;background:#f4f3ff;color:#534AB7;border:1px solid #e8e6f8;border-radius:14px;cursor:pointer;transition:all .2s}
.picks button:hover{background:#534AB7;color:#fff}
.picks button.active{background:#534AB7;color:#fff}
.loading{text-align:center;padding:40px 20px}
.spinner{width:44px;height:44px;margin:0 auto 16px;border:3px solid #ededfa;border-top:3px solid #534AB7;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading h3{font-size:15px;font-weight:600;color:#534AB7}
.loading p{font-size:12px;color:#888;margin-top:4px}
.progress{display:flex;justify-content:center;gap:5px;margin-top:14px}
.progress .dot{width:7px;height:7px;border-radius:50%;background:#e8e6f8;transition:background .3s}
.progress .dot.on{background:#534AB7}
.error{padding:14px 16px;background:#FFF5F5;border:1px solid #F09595;border-radius:10px;color:#791F1F;font-size:13px;margin-bottom:16px}
.error button{display:block;margin-top:8px;padding:6px 16px;font-size:12px;font-weight:600;background:#791F1F;color:#fff;border:none;border-radius:6px;cursor:pointer}
.result-hdr{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.result-hdr h2{font-size:20px;font-weight:800;color:#111}
.badge{padding:3px 12px;border-radius:12px;font-size:11px;font-weight:700}
.badge-bull{background:#DCFCE7;color:#166534}
.badge-bear{background:#FEE2E2;color:#991B1B}
.badge-neutral{background:#FEF9C3;color:#854D0E}
.meta{font-size:11px;color:#aaa;margin-bottom:14px}
.sec{margin-bottom:14px}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sec-hdr .icon{font-size:14px}
.sec-hdr .label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.sec-hdr .line{flex:1;height:1px}
.sec-body{font-size:13.5px;line-height:1.8;color:#333}
.metric-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 12px;border-radius:6px;margin-bottom:3px;border:1px solid #e8f5ef}
.metric-row:nth-child(odd){background:#f8fcfa}
.metric-row:nth-child(even){background:#fff}
.metric-label{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.2px}
.metric-val{font-size:14px;font-weight:700;color:#085041}
.catalyst{position:relative;padding-left:20px;margin-bottom:12px}
.catalyst .dot{position:absolute;left:0;top:5px;width:9px;height:9px;border-radius:50%;background:#534AB7}
.catalyst .date{font-size:10.5px;font-weight:700;color:#534AB7;text-transform:uppercase;letter-spacing:.3px}
.catalyst .desc{font-size:13px;line-height:1.7;color:#333;margin-top:2px}
.risk-card{padding:10px 14px;background:#FFF8F8;border-radius:8px;border-left:3px solid #F09595;margin-bottom:6px}
.risk-title{font-size:12px;font-weight:700;color:#991B1B;margin-bottom:3px}
.risk-detail{font-size:12.5px;line-height:1.7;color:#555}
.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bull-box{padding:12px;background:#F0FDF4;border-radius:10px;border:1px solid #BBF7D0}
.bear-box{padding:12px;background:#FEF2F2;border-radius:10px;border:1px solid #FECACA}
.case-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.bull-label{color:#166534}
.bear-label{color:#991B1B}
.case-text{font-size:12.5px;line-height:1.8;color:#333}
.peer{padding:10px 14px;border-radius:8px;margin-bottom:5px;border:1px solid #fde8df}
.peer:nth-child(odd){background:#FFFAF8}
.peer:nth-child(even){background:#fff}
.peer-name{font-size:13px;font-weight:700;color:#9A3412}
.peer-desc{font-size:12.5px;line-height:1.7;color:#555;margin-top:3px}
.thesis-box{padding:14px 16px;background:linear-gradient(135deg,#F0FDF4,#ECFDF5);border-radius:10px;border:1px solid #A7F3D0;font-size:13.5px;line-height:1.85;color:#1a1a1a}
.disc{margin-top:18px;padding:12px;background:#f0f0f0;border-radius:8px;font-size:10px;color:#999;text-align:center;line-height:1.5}
.footer{margin-top:24px;padding-top:14px;border-top:1px solid #e8e8e8;text-align:center;font-size:10px;color:#ccc}
.empty{text-align:center;padding:40px 0;color:#ccc}
.empty .big{font-size:40px;opacity:.25;margin-bottom:8px}
.empty p{font-size:13px}
@media(max-width:600px){.split{grid-template-columns:1fr}.metric-row{flex-wrap:wrap;gap:4px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="c1"></div><div class="c2"></div>
    <div class="tag">AI-POWERED EQUITY RESEARCH</div>
    <h1>Equity Research Copilot</h1>
    <p>Professional-grade research briefs in seconds • US & Indian markets • Built by Prem</p>
  </div>

  <div class="input-row">
    <input id="ticker" placeholder="Enter any stock ticker (AAPL, RELIANCE, NVDA, INFY...)" />
    <button id="go" onclick="analyze()">Generate →</button>
  </div>

  <div class="picks" id="picks"></div>
  <div id="output"></div>

  <div class="footer">Built by Prem • AI Equity Research Copilot • Powered by Gemini AI</div>
</div>

<script>
// ============================================================
// PASTE YOUR FREE GEMINI API KEY BELOW (get it from aistudio.google.com)
// ============================================================
const API_KEY = "AIzaSyDYSBREz07g8HA6YubL2Rg8_VqTDuV4j0w";
// ============================================================

const picks = [
  {t:"AAPL",n:"Apple",f:"🇺🇸"},{t:"NVDA",n:"Nvidia",f:"🇺🇸"},{t:"MSFT",n:"Microsoft",f:"🇺🇸"},
  {t:"GOOGL",n:"Alphabet",f:"🇺🇸"},{t:"TSLA",n:"Tesla",f:"🇺🇸"},{t:"AMZN",n:"Amazon",f:"🇺🇸"},
  {t:"RELIANCE",n:"Reliance",f:"🇮🇳"},{t:"TCS",n:"TCS",f:"🇮🇳"},{t:"INFY",n:"Infosys",f:"🇮🇳"},
  {t:"HDFCBANK",n:"HDFC Bank",f:"🇮🇳"},{t:"ITC",n:"ITC",f:"🇮🇳"},{t:"WIPRO",n:"Wipro",f:"🇮🇳"},
];

const secStyles = {
  overview:{ic:"🏢",c:"#0C447C"},metric:{ic:"📊",c:"#085041"},catalyst:{ic:"📰",c:"#3C3489"},
  development:{ic:"📰",c:"#3C3489"},risk:{ic:"⚠️",c:"#991B1B"},bull:{ic:"⚖️",c:"#854D0E"},
  bear:{ic:"⚖️",c:"#854D0E"},peer:{ic:"🔍",c:"#9A3412"},competit:{ic:"🔍",c:"#9A3412"},
  landscape:{ic:"🔍",c:"#9A3412"},thesis:{ic:"📋",c:"#166534"},summary:{ic:"📋",c:"#166534"},
};

function getSS(t){const l=t.toLowerCase();for(const[k,v]of Object.entries(secStyles)){if(l.includes(k))return v;}return{ic:"📄",c:"#444"};}

const prompt = (tk) => `You are a senior equity research analyst at Goldman Sachs. Generate a detailed, data-rich equity research brief for the stock: ${tk}.

Use INR (₹) for Indian stocks (NSE/BSE listed). Use USD ($) for US stocks.
Be specific with real numbers — never say "significant" without a number.
Write authoritatively. Do NOT mention data limitations.

Use EXACTLY these ## markdown section headers:

## Company Overview
3-4 sentences: what the company does, CEO name, HQ, number of employees, business segments, market position.

## Key Financial Metrics
Use this exact bullet format (fill ALL):
- **Market Cap**: [number]
- **Stock Price (Approx)**: [number]
- **P/E Ratio**: [number]
- **Revenue (Annual)**: [amount + year]
- **Net Profit Margin**: [%]
- **ROE**: [%]
- **Debt/Equity**: [ratio]
- **EPS**: [amount]
- **Dividend Yield**: [% or N/A]

## Recent Catalysts & Developments
4 bullets. Each MUST start with a bold date like **Q3 2025:** followed by 2 sentences with specific numbers.

## Risk Factors
4 bullets. Each MUST start with a bold title like **Regulatory Risk:** followed by 2 sentences specific to THIS company.

## Bull Case vs Bear Case
**Bull Case:** 3 sentences with specific growth drivers and numbers.
**Bear Case:** 3 sentences with specific concerns and numbers.

## Competitive Landscape
3 bullets: **[Competitor Name]**: 1-2 sentences comparing.
Then: **Competitive Moat:** 2 sentences on durable advantage.

## Investment Thesis
4 sentences. Synthesize everything. End with exactly: **Outlook: Bullish** or **Outlook: Neutral** or **Outlook: Bearish**`;

let currentTicker = "";
let stepInterval = null;

// Render picks
const picksEl = document.getElementById("picks");
picks.forEach(p => {
  const b = document.createElement("button");
  b.textContent = `${p.f} ${p.t} ${p.n}`;
  b.onclick = () => { document.getElementById("ticker").value = p.t; analyze(); };
  picksEl.appendChild(b);
});

document.getElementById("ticker").addEventListener("keydown", e => { if(e.key === "Enter") analyze(); });

async function analyze() {
  const tk = document.getElementById("ticker").value.trim().toUpperCase();
  if(!tk) return;
  if(API_KEY === "YOUR_API_KEY_HERE") {
    document.getElementById("output").innerHTML = `<div class="error">Please add your free Gemini API key first.<br><br>1. Go to <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a><br>2. Click "Create API Key"<br>3. Copy the key<br>4. Replace YOUR_API_KEY_HERE in the code</div>`;
    return;
  }
  currentTicker = tk;
  document.getElementById("go").disabled = true;
  document.getElementById("go").textContent = "Analyzing...";

  // Highlight active pick
  document.querySelectorAll(".picks button").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".picks button").forEach(b => { if(b.textContent.includes(tk)) b.classList.add("active"); });

  const steps = ["Pulling company profile...","Analyzing financials...","Scanning news & catalysts...","Evaluating risk factors...","Building investment thesis...","Generating brief..."];
  let step = 0;
  const renderLoading = () => {
    document.getElementById("output").innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <h3>Researching ${tk}</h3>
        <p>${steps[Math.min(step,5)]}</p>
        <div class="progress">${steps.map((_,i) => `<div class="dot ${i<=step?'on':''}"></div>`).join("")}</div>
      </div>`;
  };
  renderLoading();
  stepInterval = setInterval(() => { step = Math.min(step+1, 5); renderLoading(); }, 2500);

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt(tk) }] }],
        generationConfig: { maxOutputTokens: 3000, temperature: 0.7 }
      })
    });
    clearInterval(stepInterval);
    const data = await res.json();
    
    if(data.error) {
      document.getElementById("output").innerHTML = `<div class="error">${data.error.message}<button onclick="analyze()">Retry</button></div>`;
      resetBtn(); return;
    }

    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    if(text.length < 100) {
      document.getElementById("output").innerHTML = `<div class="error">Response too short. Try a well-known stock.<button onclick="analyze()">Retry</button></div>`;
      resetBtn(); return;
    }

    renderBrief(tk, text);
  } catch(e) {
    clearInterval(stepInterval);
    document.getElementById("output").innerHTML = `<div class="error">Connection error: ${e.message}<button onclick="analyze()">Retry</button></div>`;
  }
  resetBtn();
}

function resetBtn() {
  document.getElementById("go").disabled = false;
  document.getElementById("go").textContent = "Generate →";
}

function renderBrief(tk, text) {
  const sections = parseSections(text);
  const outlook = getOutlook(text);
  const badgeClass = outlook === "Bullish" ? "badge-bull" : outlook === "Bearish" ? "badge-bear" : "badge-neutral";
  const emoji = outlook === "Bullish" ? "🟢" : outlook === "Bearish" ? "🔴" : "🟡";
  const date = new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});

  let html = `
    <div class="result-hdr">
      <h2>${tk} Research Brief</h2>
      <span class="badge ${badgeClass}">${emoji} ${outlook}</span>
    </div>
    <div class="meta">${date} • AI-generated with Gemini</div>`;

  sections.forEach(sec => {
    const s = getSS(sec.t);
    const isBullBear = sec.t.toLowerCase().includes("bull") && sec.t.toLowerCase().includes("bear");
    
    html += `<div class="sec"><div class="sec-hdr"><span class="icon">${s.ic}</span><span class="label" style="color:${s.c}">${sec.t}</span><div class="line" style="background:${s.c}22"></div></div>`;

    if(sec.t.toLowerCase().includes("metric")) {
      html += renderMetrics(sec.c);
    } else if(sec.t.toLowerCase().includes("catalyst") || sec.t.toLowerCase().includes("development")) {
      html += renderCatalysts(sec.c);
    } else if(sec.t.toLowerCase().includes("risk")) {
      html += renderRisks(sec.c);
    } else if(isBullBear) {
      html += renderBullBear(sec.c);
    } else if(sec.t.toLowerCase().includes("thesis") || sec.t.toLowerCase().includes("summary")) {
      html += `<div class="thesis-box">${formatText(sec.c)}</div>`;
    } else {
      html += `<div class="sec-body">${formatText(sec.c)}</div>`;
    }
    html += `</div>`;
  });

  html += `<div class="disc">AI-generated equity research brief for informational purposes only. Not financial advice. Always conduct independent due diligence before making investment decisions.</div>`;
  document.getElementById("output").innerHTML = html;
}

function parseSections(text) {
  const secs = []; let cur = null, buf = [];
  text.split("\n").forEach(ln => {
    if(ln.startsWith("## ")) {
      if(cur) secs.push({t:cur,c:buf.join("\n").trim()});
      cur = ln.slice(3).trim(); buf = [];
    } else if(cur !== null) buf.push(ln);
  });
  if(cur) secs.push({t:cur,c:buf.join("\n").trim()});
  return secs;
}

function getOutlook(text) {
  if(text.includes("Outlook: Bullish") || text.includes("Outlook: bullish")) return "Bullish";
  if(text.includes("Outlook: Bearish") || text.includes("Outlook: bearish")) return "Bearish";
  return "Neutral";
}

function formatText(t) {
  return t.split("\n").map(ln => {
    if(!ln.trim()) return "<div style='height:4px'></div>";
    ln = ln.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    if(ln.trim().startsWith("- ")) return `<div style="padding:3px 0 3px 18px;position:relative"><span style="position:absolute;left:3px;color:#aaa">•</span>${ln.trim().slice(2)}</div>`;
    return `<div style="padding:2px 0">${ln}</div>`;
  }).join("");
}

function renderMetrics(c) {
  return c.split("\n").filter(l => l.trim().startsWith("- ")).map(ln => {
    const m = ln.match(/\*\*(.+?)\*\*:\s*(.+)/);
    if(m) return `<div class="metric-row"><span class="metric-label">${m[1]}</span><span class="metric-val">${m[2]}</span></div>`;
    return "";
  }).join("");
}

function renderCatalysts(c) {
  let html = '<div style="border-left:2px solid #EEEDFE;margin-left:4px;padding-left:16px">';
  c.split("\n").filter(l => l.trim().startsWith("- ")).forEach(ln => {
    const m = ln.match(/\*\*(.+?)\*\*:?\s*(.*)/);
    if(m) html += `<div class="catalyst"><div class="dot"></div><div class="date">${m[1]}</div><div class="desc">${m[2]}</div></div>`;
  });
  html += "</div>";
  return html;
}

function renderRisks(c) {
  let html = "";
  c.split("\n").filter(l => l.trim().startsWith("- ")).forEach(ln => {
    const m = ln.match(/\*\*(.+?)\*\*:?\s*(.*)/);
    if(m) html += `<div class="risk-card"><div class="risk-title">${m[1]}</div><div class="risk-detail">${m[2]}</div></div>`;
  });
  return html;
}

function renderBullBear(c) {
  const parts = c.split(/\*\*Bear Case:?\*\*/i);
  const bull = (parts[0]||"").replace(/\*\*Bull Case:?\*\*/i,"").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").trim();
  const bear = (parts[1]||"").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").trim();
  return `<div class="split">
    <div class="bull-box"><div class="case-label bull-label">🟢 Bull Case</div><div class="case-text">${bull}</div></div>
    <div class="bear-box"><div class="case-label bear-label">🔴 Bear Case</div><div class="case-text">${bear}</div></div>
  </div>`;
}
</script>
</body>
</html>
